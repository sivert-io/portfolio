server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
  }

  location /about-me/ {
    try_files $uri =404;
  }

  location /gryt/ {
    try_files $uri =404;
  }

  location = /favicon.ico {
    try_files $uri =404;
  }

  location = /robots.txt {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}